<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pink: #ffd1dc; --text: #555; --bg-modal: rgba(255,255,255,0.95); --primary: #ff4d6d; }
        body { margin: 0; font-family: 'Quicksand', sans-serif; background: var(--pink); height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        .hidden { display: none !important; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOutUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-50px); } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        
        .intro-anim { animation: fadeInUp 1s ease-out forwards; }
        .exit-anim { animation: fadeOutUp 0.6s ease-in forwards; }
        .menu-anim { animation: zoomIn 0.8s ease-out forwards; }
        .flower { position: absolute; top: -10%; user-select: none; pointer-events: none; animation: fall linear forwards; z-index: 0; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        .lock-container { display: flex; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 650px; gap: 30px; align-items: center; z-index: 10; }
        .lock-left { flex: 1; display: flex; justify-content: center; }
        .lock-left img { width: 100%; max-width: 250px; height: 350px; object-fit: cover; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .lock-right { flex: 1; text-align: center; }
        .dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; }
        .dot { font-size: 16px; color: #ccc; }
        .dot.active { color: var(--primary); }
        .keys { display: grid; grid-template-columns: repeat(3, 60px); gap: 15px; justify-content: center; }
        .key { width: 60px; height: 60px; border-radius: 50%; border: none; background: white; font-size: 20px; color: var(--text); box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; font-family: 'Quicksand', sans-serif;}
        .key:active { transform: scale(0.9); background: var(--primary); color: white; }
        .key-del { background: transparent; box-shadow: none; color: var(--primary); font-size: 24px; }

        #main-menu { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 5; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 450px; z-index: 10; }
        .menu-item { background: rgba(255,255,255,0.8); border-radius: 20px; padding: 25px 10px; cursor: pointer; text-align: center; color: var(--text); transition: 0.3s; font-weight: bold; }
        .menu-item:hover { transform: translateY(-5px); background: white; }
        .menu-item i { font-size: 35px; color: var(--primary); margin-bottom: 10px; display: block; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--bg-modal); width: 450px; max-height: 85vh; border-radius: 20px; padding: 25px; position: relative; overflow: hidden; text-align: center; }
        .close-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 24px; color: var(--primary); cursor: pointer; z-index: 20; }

        .track-list { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .track-btn { border: 2px solid var(--primary); background: transparent; color: var(--primary); border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-weight: bold; }
        .track-btn.active { background: var(--primary); color: white; }
        .music-controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 20px; }
        .ctrl-btn { font-size: 35px; color: var(--primary); cursor: pointer; background: none; border: none; }
        .progress-container { display: flex; align-items: center; gap: 10px; margin-top: 20px; font-size: 12px; color: #666; }
        input[type="range"] { flex: 1; accent-color: var(--primary); cursor: pointer; }
        .spin-anim { animation: spin 10s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .marquee-container { width: 100%; overflow: hidden; display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        .marquee-row { display: flex; gap: 15px; width: max-content; }
        .row-left { animation: scrollLeft 15s linear infinite; }
        .row-right { animation: scrollRight 15s linear infinite; }
        @keyframes scrollLeft { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        @keyframes scrollRight { 0% { transform: translateX(-50%); } 100% { transform: translateX(0); } }
        .marquee-row img { width: 120px; height: 120px; object-fit: cover; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .marquee-row img:hover { transform: scale(1.05); border: 2px solid var(--primary); }
        
        .cursor::after { content: '|'; animation: blink 1s infinite; color: var(--primary); }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* --- VƯỜN HOA TULIP ĐẸP MẮT --- */
        .tulip-garden { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 220px; height: 180px; z-index: 5; display: flex; justify-content: space-evenly; align-items: flex-end; }
        .tulip { position: relative; width: 40px; height: 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; transition: height 2s ease-out; }
        .stem { width: 6px; height: 100%; background: #4caf50; border-radius: 3px; }
        
        .flower-head { position: absolute; top: -35px; width: 34px; height: 40px; opacity: 0; transform: scale(0) translateY(20px); transition: all 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 2; }
        .petal { position: absolute; bottom: 0; background: var(--primary); border-radius: 50% 50% 20% 20%; box-shadow: inset -3px -3px 10px rgba(0,0,0,0.1); }
        .p1 { width: 34px; height: 40px; left: 0; z-index: 1; }
        .p2 { width: 20px; height: 35px; left: -6px; transform: rotate(-15deg); z-index: 0; }
        .p3 { width: 20px; height: 35px; right: -6px; transform: rotate(15deg); z-index: 0; }
        
        .leaf { position: absolute; width: 18px; height: 45px; background: #4caf50; border-radius: 50% 0 50% 0; opacity: 0; transition: opacity 1s, transform 1s; }
        .leaf.left { left: -12px; bottom: 20px; transform: rotate(-30deg) scale(0); transform-origin: bottom right; }
        .leaf.right { right: -12px; bottom: 40px; border-radius: 0 50% 0 50%; transform: rotate(30deg) scale(0); transform-origin: bottom left; }

        /* Đổi màu hoa cho đa dạng */
        .t2 .petal { background: #ff7eb3; }
        .t3 .petal { background: #ff9a9e; }

        /* Trạng thái cây mọc */
        .garden-active .t1 { height: 120px; transition-delay: 0.2s; }
        .garden-active .t2 { height: 160px; transition-delay: 0.5s; }
        .garden-active .t3 { height: 100px; transition-delay: 0.8s; }
        
        .garden-active .tulip .flower-head { opacity: 1; transform: scale(1) translateY(0); }
        .garden-active .t1 .flower-head { transition-delay: 1.5s; }
        .garden-active .t2 .flower-head { transition-delay: 1.8s; }
        .garden-active .t3 .flower-head { transition-delay: 2.1s; }
        
        .garden-active .tulip .leaf { opacity: 1; }
        .garden-active .tulip .leaf.left { transform: rotate(-30deg) scale(1); }
        .garden-active .tulip .leaf.right { transform: rotate(30deg) scale(1); }
        .garden-active .t1 .leaf { transition-delay: 1.0s; }
        .garden-active .t2 .leaf { transition-delay: 1.3s; }
        .garden-active .t3 .leaf { transition-delay: 1.6s; }

        .falling-item { position: absolute; top: -80px; z-index: 6; animation: fallItem linear forwards; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .falling-item img { width: 70px; height: 70px; object-fit: cover; border-radius: 10px; border: 2px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .falling-item span { background: rgba(255,255,255,0.9); color: var(--primary); padding: 5px 15px; border-radius: 15px; font-weight: bold; font-size: 14px; white-space: nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        @keyframes fallItem { to { transform: translateY(800px) rotate(15deg); } }

        #lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        #lightbox img { max-width: 90%; max-height: 85vh; border-radius: 10px; border: 3px solid white; }
        .close-lightbox { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="flower-container"></div>

    <div id="lock-screen" class="lock-container intro-anim">
        <div class="lock-left"><img src="anh/anhnen.jpg" onerror="this.src='https://via.placeholder.com/250x350?text=anhnen.jpg'"></div>
        <div class="lock-right">
            <h2 style="font-family: cursive; color: var(--primary);">Mở khóa yêu thương</h2>
            <div class="dots" id="dots"><i class="far fa-circle dot"></i><i class="far fa-circle dot"></i><i class="far fa-circle dot"></i><i class="far fa-circle dot"></i><i class="far fa-circle dot"></i><i class="far fa-circle dot"></i></div>
            <div class="keys">
                <button class="key" onclick="press('1')">1</button><button class="key" onclick="press('2')">2</button><button class="key" onclick="press('3')">3</button>
                <button class="key" onclick="press('4')">4</button><button class="key" onclick="press('5')">5</button><button class="key" onclick="press('6')">6</button>
                <button class="key" onclick="press('7')">7</button><button class="key" onclick="press('8')">8</button><button class="key" onclick="press('9')">9</button>
                <button class="key key-del" onclick="clearPass()"><i class="fas fa-backspace"></i></button><button class="key" onclick="press('0')">0</button>
                <button class="key" style="background:var(--primary);color:white;" onclick="checkPass()"><i class="fas fa-unlock"></i></button>
            </div>
        </div>
    </div>

    <div id="main-menu" class="hidden">
        <div class="menu-grid">
            <div class="menu-item" onclick="openModal('modal-music')"><i class="fas fa-music"></i><span>Âm Nhạc</span></div>
            <div class="menu-item" onclick="openModal('modal-letter')"><i class="fas fa-envelope-open-text"></i><span>Thư Tay</span></div>
            <div class="menu-item" onclick="openModal('modal-image')"><i class="fas fa-images"></i><span>Hình Ảnh</span></div>
            <div class="menu-item" onclick="openModal('modal-gift')"><i class="fas fa-gift"></i><span>Quà Tặng</span></div>
        </div>
    </div>

    <div id="modal-music" class="modal hidden">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('modal-music')"><i class="fas fa-times"></i></button>
            <h3 style="color: var(--primary);">MUSIC PLAYER</h3>
            
            <img src="https://via.placeholder.com/200?text=Chưa+Chọn+Nhạc" style="width:180px; height:180px; object-fit:cover; border-radius:50%; margin:10px auto; display:block; border: 3px solid #ffd1dc;" id="cd-thumb">
            <h4 id="song-title" style="color: var(--text); margin: 20px 0 10px 0;">Vui lòng chọn bài hát</h4>
            
            <audio id="audio-player" preload="auto"></audio>
            
            <div class="track-list">
                <button class="track-btn" onclick="loadTrack(1)">1</button>
                <button class="track-btn" onclick="loadTrack(2)">2</button>
                <button class="track-btn" onclick="loadTrack(3)">3</button>
                <button class="track-btn" onclick="loadTrack(4)">4</button>
            </div>
            <div class="progress-container"><span id="current-time">0:00</span><input type="range" id="progress-bar" value="0" min="0" step="1"><span id="duration-time">0:00</span></div>
            <div class="music-controls"><button class="ctrl-btn" onclick="togglePlay()"><i class="fas fa-play-circle" id="play-icon"></i></button><button class="ctrl-btn" onclick="nextTrack()"><i class="fas fa-step-forward"></i></button></div>
        </div>
    </div>

    <div id="modal-letter" class="modal hidden">
        <div class="modal-content" style="width: 500px; text-align: left; background: #fffdf5;">
            <button class="close-btn" onclick="closeModal('modal-letter')"><i class="fas fa-times"></i></button>
            <h3 style="color: var(--primary); font-family: cursive; text-align: center; border-bottom: 2px dashed #ffd1dc; padding-bottom: 10px;">Gửi em...</h3>
            <p id="typewriter-text" class="cursor" style="line-height: 1.8; color: #444; margin-top: 20px; min-height: 120px; font-size: 16px;"></p>
        </div>
    </div>

    <div id="modal-image" class="modal hidden">
        <div class="modal-content" style="width: 550px;">
            <button class="close-btn" onclick="closeModal('modal-image')"><i class="fas fa-times"></i></button>
            <h3 style="color: var(--primary);">KỶ NIỆM</h3>
            <div class="marquee-container">
                <div class="marquee-row row-left">
                    <img src="anh/anh1.jpg" onclick="openLightbox(this.src)"><img src="anh/anh2.jpg" onclick="openLightbox(this.src)"><img src="anh/anh3.jpg" onclick="openLightbox(this.src)">
                    <img src="anh/anh1.jpg" onclick="openLightbox(this.src)"><img src="anh/anh2.jpg" onclick="openLightbox(this.src)"><img src="anh/anh3.jpg" onclick="openLightbox(this.src)">
                </div>
                <div class="marquee-row row-right">
                    <img src="anh/anh4.jpg" onclick="openLightbox(this.src)"><img src="anh/anh5.jpg" onclick="openLightbox(this.src)"><img src="anh/anh6.jpg" onclick="openLightbox(this.src)">
                    <img src="anh/anh4.jpg" onclick="openLightbox(this.src)"><img src="anh/anh5.jpg" onclick="openLightbox(this.src)"><img src="anh/anh6.jpg" onclick="openLightbox(this.src)">
                </div>
            </div>
        </div>
    </div>

    <div id="modal-gift" class="modal hidden">
        <div class="modal-content" style="background: #1a1a2e; color: white; height: 500px;">
            <button class="close-btn" onclick="closeModal('modal-gift')"><i class="fas fa-times"></i></button>
            <h2 style="color: #ffb6c1; font-family: cursive; margin-top: 20px; position: relative; z-index: 10;">Bất ngờ nhỏ ❤️</h2>
            
            <div class="tulip-garden" id="gift-tulips">
                <div class="tulip t1">
                    <div class="stem"></div><div class="leaf left"></div><div class="leaf right"></div>
                    <div class="flower-head"><div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div></div>
                </div>
                <div class="tulip t2">
                    <div class="stem"></div><div class="leaf left"></div><div class="leaf right"></div>
                    <div class="flower-head"><div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div></div>
                </div>
                <div class="tulip t3">
                    <div class="stem"></div><div class="leaf left"></div><div class="leaf right"></div>
                    <div class="flower-head"><div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div></div>
                </div>
            </div>

            <div id="gift-falling-items"></div>
        </div>
    </div>

    <div id="lightbox" class="hidden"><i class="fas fa-times close-lightbox" onclick="closeLightbox()"></i><img id="lightbox-img" src=""></div>

    <script>
        // MÀN HÌNH KHÓA
        let pass = ""; const CORRECT = "123456"; const dots = document.getElementById("dots").children;
        const lockScreen = document.getElementById("lock-screen"); const mainMenu = document.getElementById("main-menu");

        function updateDots() { for(let i=0; i<6; i++) { dots[i].className = i < pass.length ? "fas fa-heart dot active" : "far fa-circle dot"; } }
        function press(n) { if(pass.length < 6) { pass += n; updateDots(); } }
        function clearPass() { pass = ""; updateDots(); }
        
        function checkPass() {
            if(pass === CORRECT) {
                lockScreen.classList.replace("intro-anim", "exit-anim");
                setTimeout(() => { lockScreen.classList.add("hidden"); mainMenu.classList.remove("hidden"); mainMenu.classList.add("menu-anim"); startMenuFlowers(); }, 600);
            } else { alert("Sai mã rồi nhé!"); clearPass(); }
        }

        let flowerInterval;
        function startMenuFlowers() {
            const container = document.getElementById("flower-container"); const icons = ['🌸', '🌺', '✨', '🩷'];
            flowerInterval = setInterval(() => {
                const el = document.createElement("div"); el.classList.add("flower"); el.innerText = icons[Math.floor(Math.random() * icons.length)];
                el.style.left = Math.random() * 100 + "vw"; el.style.fontSize = (Math.random() * 15 + 15) + "px"; el.style.animationDuration = (Math.random() * 5 + 4) + "s";
                container.appendChild(el); setTimeout(() => el.remove(), 9000);
            }, 400);
        }

        // MODAL (SỬA ĐỂ KHÔNG TẮT NHẠC)
        function openModal(id) { 
            document.getElementById(id).classList.remove("hidden"); 
            if(id === 'modal-letter') startTypewriter();
            if(id === 'modal-gift') startGiftAnimation();
        }
        function closeModal(id) { 
            document.getElementById(id).classList.add("hidden"); 
            if(id === 'modal-letter') document.getElementById("typewriter-text").innerHTML = ""; 
            if(id === 'modal-gift') stopGiftAnimation();
            // Đã xóa lệnh tắt nhạc tại đây để nhạc tiếp tục phát ẩn!
        }

        // ÂM NHẠC
        const audio = document.getElementById("audio-player"); const playIcon = document.getElementById("play-icon"); const progressBar = document.getElementById("progress-bar");
        const cdThumb = document.getElementById("cd-thumb"); const songTitle = document.getElementById("song-title"); const trackBtns = document.querySelectorAll(".track-btn");
        let currentTrackIndex = null;

		// 1. Cậu hãy tự điền tên 4 bài hát vào đây nhé (giữ nguyên dấu ngoặc kép):
        const danhSachTenBaiHat = [
            "", // Vị trí số 0 (không dùng tới)
            "Yêu Nhau Nhé Bạn Thân", 
            "Đừng Làm Trái Tim Anh Đau", 
            "Ai Ngoài Anh x Đưa Em Về Nhà", 
            "Dạo Bước - HONGKONG1999"  
        ];

        function loadTrack(index) {
            currentTrackIndex = index;
            audio.src = "nhac/" + index + ".mp3"; 
            cdThumb.src = "anh/nennhac" + index + ".jpg"; 
            cdThumb.classList.add("spin-anim");
            
            // Lấy tên bài hát từ danh sách và in ra HTML
            songTitle.innerHTML = danhSachTenBaiHat[index]; 
   
            audio.play().catch(e => console.log(e)); 
            playIcon.className = "fas fa-pause-circle";
            trackBtns.forEach(btn => btn.classList.remove("active")); 
            trackBtns[index-1].classList.add("active");
        }

        function togglePlay() {
            if(!currentTrackIndex) { alert("Hãy chọn một bài hát trước nhé!"); return; }
            if (audio.paused) { audio.play(); playIcon.className = "fas fa-pause-circle"; cdThumb.style.animationPlayState = "running";
            } else { audio.pause(); playIcon.className = "fas fa-play-circle"; cdThumb.style.animationPlayState = "paused"; }
        }

        function nextTrack() { if(!currentTrackIndex) return; let next = currentTrackIndex >= 4 ? 1 : currentTrackIndex + 1; loadTrack(next); }

        audio.addEventListener("timeupdate", () => {
            if (!isNaN(audio.duration)) { progressBar.value = (audio.currentTime / audio.duration) * 100; document.getElementById("current-time").textContent = formatTime(audio.currentTime); }
        });
        audio.addEventListener("loadedmetadata", () => { document.getElementById("duration-time").textContent = formatTime(audio.duration); });
        progressBar.addEventListener("input", () => { if(audio.duration) audio.currentTime = (progressBar.value / 100) * audio.duration; });
        audio.addEventListener("ended", nextTrack);

        function formatTime(seconds) { let min = Math.floor(seconds / 60); let sec = Math.floor(seconds % 60); return `${min}:${sec < 10 ? '0' : ''}${sec}`; }

        // THƯ TAY
        const letterContent = "Chúc em một ngày thật vui vẻ và hạnh phúc. Cảm ơn em vì đã luôn ở bên cạnh anh.\n\nMãi yêu em! ❤️";
        let typeTimer;
        function startTypewriter() {
            const el = document.getElementById("typewriter-text"); el.innerHTML = ""; el.classList.add("cursor"); let i = 0; clearTimeout(typeTimer);
            function type() {
                if (i < letterContent.length) { el.innerHTML += letterContent.charAt(i) === '\n' ? '<br>' : letterContent.charAt(i); i++; typeTimer = setTimeout(type, 50); 
                } else { el.classList.remove('cursor'); }
            } type();
        }

        // QUÀ TẶNG HOA TULIP & ẢNH RƠI
        let giftInterval;
        function startGiftAnimation() {
            const garden = document.getElementById("gift-tulips"); const container = document.getElementById("gift-falling-items"); container.innerHTML = ""; 
            
            setTimeout(() => { garden.classList.add("garden-active"); }, 200);

            giftInterval = setInterval(() => {
                const el = document.createElement("div"); el.classList.add("falling-item");
                el.style.left = (Math.random() * 80 + 10) + "%"; el.style.animationDuration = (Math.random() * 3 + 4) + "s"; 

                if (Math.random() > 0.5) {
                    const imgNum = Math.floor(Math.random() * 6) + 1; el.innerHTML = `<img src="anh/anh${imgNum}.jpg">`;
                } else {
                    const msgs = ["Thương em ❤️", "Always with you", "Bình yên nhé", "Mãi yêu", "Nụ cười của em"];
                    el.innerHTML = `<span>${msgs[Math.floor(Math.random() * msgs.length)]}</span>`;
                }
                container.appendChild(el); setTimeout(() => el.remove(), 7000);
            }, 800);
        }

        function stopGiftAnimation() {
            clearInterval(giftInterval); document.getElementById("gift-tulips").classList.remove("garden-active"); document.getElementById("gift-falling-items").innerHTML = "";
        }

        // LIGHTBOX
        function openLightbox(src) { document.getElementById("lightbox-img").src = src; document.getElementById("lightbox").classList.remove("hidden"); }
        function closeLightbox() { document.getElementById("lightbox").classList.add("hidden"); }
    </script>
</body>
</html>
